plugins {
    id 'com.android.application'
}

android {
    namespace 'com.anddrive.companion'
    compileSdk 34

    defaultConfig {
        applicationId 'com.anddrive.companion'
        minSdk 24
        targetSdk 34
        versionCode 11
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
